name: HireSense CI Pipeline

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    
    steps:
    - uses: actions/checkout@v3
    - name: Initialize Python Runtime
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        
    - name: Install System Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest httpx
        
    - name: Validation Phase Placeholder
      run: |
        echo "Pytest suites execute here against FastAPI endpoints."
        # pytest tests/ -v

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    
    steps:
    - uses: actions/checkout@v3
    - name: Initialize Node Stack
      uses: actions/setup-node@v3
      with:
        node-version: 18.x
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'
        
    - name: Mount Modules
      run: npm ci
      
    - name: Execute Vite Build
      run: npm run build
      env:
        CI: false
