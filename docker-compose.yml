version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: hiresense_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build: ./backend
    container_name: hiresense_backend
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/hiresense
      - JWT_SECRET=your_jwt_secret_here
      - JWT_ALGORITHM=HS256
    depends_on:
      - mongodb
    volumes:
      - ./dataset.csv:/app/dataset.csv

  frontend:
    build: ./frontend
    container_name: hiresense_frontend
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  mongodb_data:
